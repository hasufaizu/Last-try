<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Enhancer - Upload</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 2rem;
        }

        h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .dropzone {
            border: 3px dashed #cbd5e1;
            border-radius: 1.5rem;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8fafc;
        }

        .dropzone:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .preview-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .preview-box {
            background: #f8fafc;
            border-radius: 1rem;
            padding: 1rem;
        }

        .preview-box img {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 0.5rem;
        }

        .settings {
            background: #f1f5f9;
            padding: 1.5rem;
            border-radius: 1rem;
            margin-top: 2rem;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .admin-link {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: #1e293b;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            text-decoration: none;
            font-size: 0.8rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>✨ AI Image Enhancer</h1>
            <p>Upload, enhance, and automatically save to your private gallery</p>

            <div class="dropzone" id="dropzone">
                📸 Drag & drop image here or click to upload
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
            </div>

            <div class="preview-area">
                <div class="preview-box">
                    <h3>📷 Original</h3>
                    <img id="originalPreview" style="display: none;">
                    <div id="originalPlaceholder" style="padding: 3rem; text-align: center; color: #94a3b8;">No image selected</div>
                </div>
                <div class="preview-box">
                    <h3>🌟 Enhanced</h3>
                    <img id="enhancedPreview" style="display: none;">
                    <div id="enhancedPlaceholder" style="padding: 3rem; text-align: center; color: #94a3b8;">AI enhancement will appear here</div>
                </div>
            </div>

            <div class="settings">
                <h3>⚙️ Enhancement Settings</h3>
                <div style="margin: 1rem 0;">
                    <label style="margin-right: 1rem;">
                        <input type="radio" name="upscale" value="2" checked> 2x Upscale
                    </label>
                    <label style="margin-right: 1rem;">
                        <input type="radio" name="upscale" value="4"> 4x Upscale
                    </label>
                    <label>
                        <input type="radio" name="upscale" value="1"> Denoise Only
                    </label>
                </div>
                <button id="enhanceBtn">🚀 Enhance & Save to Gallery</button>
            </div>
        </div>
    </div>

    <a href="admin.html" class="admin-link" target="_blank">🔐 Admin Panel</a>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const originalPreview = document.getElementById('originalPreview');
        const originalPlaceholder = document.getElementById('originalPlaceholder');
        const enhancedPreview = document.getElementById('enhancedPreview');
        const enhancedPlaceholder = document.getElementById('enhancedPlaceholder');
        const enhanceBtn = document.getElementById('enhanceBtn');

        let currentFile = null;
        let currentBase64 = null;

        // JSONBin configuration (FREE account needed - sign up at jsonbin.io)
        const JSONBIN_BIN_ID = "6a01b6c0250b1311c3334aed"; // Replace with your bin ID
        const JSONBIN_API_KEY = "$2a$10$6GTFn.ZLxsDXMvnVcKvqB.Wb3735l20g52AebtN4HPQV0S8cu7IXq"; // Replace with your API key

        // Show toast message
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.background = isError ? '#ef4444' : '#10b981';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Handle file upload
        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.style.borderColor = '#667eea';
        });
        dropzone.addEventListener('dragleave', () => {
            dropzone.style.borderColor = '#cbd5e1';
        });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showToast('Please upload an image file', true);
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                showToast('File too large (max 10MB)', true);
                return;
            }

            currentFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                currentBase64 = e.target.result;
                originalPreview.src = currentBase64;
                originalPreview.style.display = 'block';
                originalPlaceholder.style.display = 'none';
                enhancedPreview.style.display = 'none';
                enhancedPlaceholder.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        // Save image to JSONBin
        async function saveToCloud(imageBase64, metadata) {
            try {
                // Fetch existing data
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                
                let data = await response.json();
                let images = data.record?.images || [];
                
                // Add new image
                images.unshift({
                    id: Date.now(),
                    base64: imageBase64,
                    filename: metadata.filename,
                    enhanced: metadata.enhanced || false,
                    timestamp: Date.now(),
                    upscaleFactor: metadata.upscaleFactor || null
                });
                
                // Update bin
                const updateResponse = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify({ images: images })
                });
                
                if (updateResponse.ok) {
                    showToast('✓ Image saved to cloud gallery!');
                    return true;
                }
            } catch (error) {
                console.error('Save error:', error);
                showToast('Failed to save to cloud', true);
                return false;
            }
        }

        // Enhance image with Picsart API
        async function enhanceImage() {
            if (!currentFile) {
                showToast('Please upload an image first', true);
                return;
            }

            const upscaleValue = document.querySelector('input[name="upscale"]:checked').value;
            enhanceBtn.disabled = true;
            enhanceBtn.textContent = '⏳ Enhancing...';

            const formData = new FormData();
            formData.append('image', currentFile);
            formData.append('upscale_factor', upscaleValue);
            formData.append('format', 'PNG');

            try {
                const response = await fetch('https://api.picsart.io/tools/1.0/upscale', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'X-Picsart-API-Key': 'paat-qMl3eu6PSb318EAasFd9ih82byW'
                    },
                    body: formData
                });

                if (!response.ok) throw new Error('Enhancement failed');

                const result = await response.json();
                const enhancedUrl = result.data.url;
                
                // Fetch enhanced image as base64
                const imgResponse = await fetch(enhancedUrl);
                const imgBlob = await imgResponse.blob();
                
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const enhancedBase64 = e.target.result;
                    
                    // Show preview
                    enhancedPreview.src = enhancedBase64;
                    enhancedPreview.style.display = 'block';
                    enhancedPlaceholder.style.display = 'none';
                    
                    // Save enhanced version to cloud
                    await saveToCloud(enhancedBase64, {
                        filename: `enhanced_${currentFile.name}`,
                        enhanced: true,
                        upscaleFactor: upscaleValue
                    });
                    
                    enhanceBtn.disabled = false;
                    enhanceBtn.textContent = '🚀 Enhance & Save to Gallery';
                    showToast('✨ Enhancement complete! Saved to gallery');
                };
                reader.readAsDataURL(imgBlob);
                
            } catch (error) {
                console.error('Enhance error:', error);
                showToast('Enhancement failed: ' + error.message, true);
                enhanceBtn.disabled = false;
                enhanceBtn.textContent = '🚀 Enhance & Save to Gallery';
            }
        }

        enhanceBtn.addEventListener('click', enhanceImage);
    </script>
</body>
</html>
