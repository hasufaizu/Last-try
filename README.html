<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VisionAI | Personal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/upscaler@latest/dist/browser/umd/upscaler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@upscalerjs/esrgan-slim@latest/dist/browser/umd/2x.min.js"></script>

    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.1); }
        
        /* Prevents the "selecting text" behavior */
        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .btn-glow:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        
        /* Ensure the icon and text don't block the click */
        #drop-zone * { pointer-events: none; }
        #file-input { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="glass w-full max-w-4xl rounded-[2.5rem] p-10 no-select">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-black tracking-tighter italic">VISION<span class="text-blue-500">AI</span></h1>
            <div id="status-tag" class="text-[10px] text-orange-500 font-mono bg-slate-900 px-3 py-1 rounded-full border border-slate-800">
                STATUS: BOOTING...
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div id="drop-zone" role="button" class="h-64 border-2 border-dashed border-slate-800 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:border-blue-500 hover:bg-blue-500/5 transition-all active:scale-[0.98]">
                    <input type="file" id="file-input" accept="image/*">
                    <i class="fa-solid fa-circle-plus text-5xl text-slate-700 mb-4"></i>
                    <p id="file-name" class="text-slate-400 text-sm font-semibold uppercase tracking-widest">Select Image</p>
                </div>

                <button id="enhance-btn" disabled class="w-full py-5 bg-blue-600 rounded-2xl font-bold tracking-widest btn-glow transition-all active:scale-95 disabled:opacity-20">
                    START ENHANCEMENT
                </button>
            </div>

            <div class="bg-black/60 rounded-3xl border border-slate-800 flex items-center justify-center relative min-h-[350px] overflow-hidden">
                <div id="preview-idle" class="text-slate-800 text-center">
                    <i class="fa-solid fa-bolt-lightning text-6xl mb-2"></i>
                    <p class="text-xs font-bold uppercase">Ready for Input</p>
                </div>

                <div id="preview-loading" class="hidden text-center z-10">
                    <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                    <p class="text-blue-500 text-[10px] font-bold">UPSCALING 2X...</p>
                </div>

                <img id="preview-img" src="" class="hidden w-full h-full object-contain">
                <a id="dl-link" href="#" download="vision_ai_result.png" class="hidden absolute bottom-4 right-4 bg-white text-black p-3 rounded-full shadow-xl hover:bg-blue-500 hover:text-white transition-colors">
                    <i class="fa-solid fa-download"></i>
                </a>
            </div>
        </div>
    </div>

    <script>
        let upscaler;
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const enhanceBtn = document.getElementById('enhance-btn');
        const statusTag = document.getElementById('status-tag');
        const previewImg = document.getElementById('preview-img');

        // Initialize AI
        window.onload = () => {
            try {
                upscaler = new Upscaler({ model: window['esrgan-slim']['2x'] });
                statusTag.innerText = "STATUS: ONLINE";
                statusTag.classList.replace('text-orange-500', 'text-blue-400');
                enhanceBtn.disabled = false;
            } catch (e) {
                statusTag.innerText = "STATUS: LOAD ERROR";
            }
        };

        // FORCE CLICK: This prevents text selection and forces the file picker
        dropZone.onclick = (e) => {
            e.stopPropagation();
            fileInput.click();
        };

        fileInput.onchange = function() {
            if (this.files && this.files[0]) {
                const file = this.files[0];
                document.getElementById('file-name').innerText = file.name;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewImg.classList.remove('hidden');
                    document.getElementById('preview-idle').classList.add('hidden');
                    document.getElementById('dl-link').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        enhanceBtn.onclick = async () => {
            if (!previewImg.src) return;
            
            document.getElementById('preview-loading').classList.remove('hidden');
            previewImg.classList.add('opacity-20');
            enhanceBtn.disabled = true;

            try {
                const result = await upscaler.upscale(previewImg.src);
                previewImg.src = result;
                const dl = document.getElementById('dl-link');
                dl.href = result;
                dl.classList.remove('hidden');
                previewImg.classList.remove('opacity-20');
            } catch (err) {
                alert("AI Engine Error: Image might be too complex for browser memory.");
            } finally {
                document.getElementById('preview-loading').classList.add('hidden');
                enhanceBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
