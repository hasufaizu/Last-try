<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Expander</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .upload-section { border: 2px dashed #38bdf8; padding: 40px; border-radius: 15px; margin-bottom: 20px; cursor: pointer; }
        .results { display: flex; gap: 20px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .card { background: #1e293b; padding: 10px; border-radius: 10px; width: 400px; }
        img { max-width: 100%; border-radius: 8px; display: block; margin-top: 10px; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 12px 24px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #64748b; }
        .loader { display: none; margin: 20px; color: #38bdf8; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Gemini Nano Expander</h1>
    <p>Upload a photo to see AI expand the borders (Outpainting).</p>

    <div class="upload-section" onclick="document.getElementById('fileInput').click()">
        <p id="uploadText">Click to upload image</p>
        <input type="file" id="fileInput" hidden accept="image/*">
    </div>

    <button id="expandBtn" disabled>Expand My Image</button>
    <div id="loader" class="loader">AI is thinking... (Expanding borders)</div>

    <div class="results">
        <div class="card">
            <h3>Result 1: Nano Banana 2</h3>
            <div id="result1"></div>
        </div>
        <div class="card">
            <h3>Result 2: Nano Banana Pro</h3>
            <div id="result2"></div>
        </div>
    </div>
</div>

<script>
    // Replace with your actual Gemini API Key from Google AI Studio
    const API_KEY = 'AIzaSyCdkV8gzzWtHXW94eqUbQI8mxMBHo95u5M'; 
    
    const fileInput = document.getElementById('fileInput');
    const expandBtn = document.getElementById('expandBtn');
    const loader = document.getElementById('loader');
    let base64Image = "";

    // 1. Handle File Upload
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = () => {
            base64Image = reader.result.split(',')[1];
            document.getElementById('uploadText').innerText = "Image Loaded: " + file.name;
            expandBtn.disabled = false;
        };
        reader.readAsDataURL(file);
    };

    // 2. Call Gemini API
    async function expandImage(targetDiv, modelName, prompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:editImage?key=${API_KEY}`;
        
        const payload = {
            content: {
                parts: [
                    { text: prompt },
                    { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                ]
            },
            generationConfig: {
                // Using the OUTPAINT mode specific to the new image models
                edit_mode: "OUTPAINT",
                aspect_ratio: "16:9" 
            }
        };

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            
            // Extract the generated image (this structure may vary slightly by API version)
            const generatedBase64 = data.candidates[0].content.parts[0].inline_data.data;
            document.getElementById(targetDiv).innerHTML = `<img src="data:image/png;base64,${generatedBase64}" />`;
        } catch (error) {
            console.error(error);
            document.getElementById(targetDiv).innerText = "Error generating image.";
        }
    }

    expandBtn.onclick = async () => {
        loader.style.display = "block";
        expandBtn.disabled = true;

        // Run both versions simultaneously
        await Promise.all([
            expandImage("result1", "gemini-3.1-flash-image-preview", "Expand this image naturally, filling the sides with a matching background."),
            expandImage("result2", "gemini-3-pro-image-preview", "Extend the borders of this image creatively to a wide cinematic shot.")
        ]);

        loader.style.display = "none";
        expandBtn.disabled = false;
    };
</script>

</body>
</html>
