<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VisionAI | Personal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/upscaler@latest/dist/browser/umd/upscaler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@upscalerjs/esrgan-slim@latest/dist/browser/umd/2x.min.js"></script>

    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.1); }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="glass w-full max-w-4xl rounded-[2.5rem] p-10 accent-glow">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-black tracking-tighter">VISION<span class="text-blue-500">AI</span></h1>
            <div id="status-tag" class="text-[10px] text-slate-500 font-mono bg-slate-900 px-3 py-1 rounded-full border border-slate-800">
                STATUS: READY
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div id="drop-zone" class="h-64 border-2 border-dashed border-slate-800 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:border-blue-500/50 transition-all">
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                    <i class="fa-solid fa-cloud-arrow-up text-4xl text-slate-700 mb-2"></i>
                    <p id="file-name" class="text-slate-500 text-sm">Select Image</p>
                </div>

                <button id="enhance-btn" class="w-full py-5 bg-blue-600 rounded-2xl font-bold tracking-widest btn-glow transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    ENHANCE (LOCAL AI)
                </button>
            </div>

            <div class="bg-black/60 rounded-3xl border border-slate-800 flex items-center justify-center relative min-h-[350px] overflow-hidden">
                <div id="preview-idle" class="text-slate-800 text-center">
                    <i class="fa-solid fa-image text-6xl mb-2"></i>
                    <p class="text-xs font-bold uppercase">No Output</p>
                </div>

                <div id="preview-loading" class="hidden text-center">
                    <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                    <p id="loading-text" class="text-blue-500 text-[10px] font-bold">BOOTING AI ENGINE...</p>
                </div>

                <img id="preview-img" src="" class="hidden w-full h-full object-contain p-2">
                <a id="dl-link" href="#" download="enhanced-vision-ai.png" class="hidden absolute bottom-4 right-4 bg-white text-black p-3 rounded-full shadow-xl hover:scale-110 transition-transform">
                    <i class="fa-solid fa-download"></i>
                </a>
            </div>
        </div>
    </div>

    <script>
        // Initialize the local Upscaler engine
        const upscaler = new Upscaler({
            model: window['esrgan-slim']['2x'] 
        });

        const fileInput = document.getElementById('file-input');
        const enhanceBtn = document.getElementById('enhance-btn');
        const previewImg = document.getElementById('preview-img');
        const loading = document.getElementById('preview-loading');
        const idle = document.getElementById('preview-idle');
        const dlLink = document.getElementById('dl-link');
        const statusTag = document.getElementById('status-tag');

        let selectedFile = null;

        document.getElementById('drop-zone').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if(selectedFile) {
                document.getElementById('file-name').innerText = selectedFile.name;
                // Show original as preview immediately
                const reader = new FileReader();
                reader.onload = (re) => {
                    previewImg.src = re.target.result;
                    previewImg.classList.remove('hidden');
                    idle.classList.add('hidden');
                }
                reader.readAsDataURL(selectedFile);
            }
        };

        enhanceBtn.onclick = async () => {
            if(!selectedFile) return alert("Upload an image first.");
            
            enhanceBtn.disabled = true;
            loading.classList.remove('hidden');
            previewImg.classList.add('opacity-30'); // Dim existing preview
            statusTag.innerText = "STATUS: PROCESSING";
            document.getElementById('loading-text').innerText = "AI UPSCALING (LOCAL GPU)...";

            try {
                // Upscale directly using the image source
                const enhancedImage = await upscaler.upscale(previewImg.src);
                
                // Show result
                previewImg.src = enhancedImage;
                previewImg.classList.remove('opacity-30', 'hidden');
                dlLink.href = enhancedImage;
                dlLink.classList.remove('hidden');
                
                statusTag.innerText = "STATUS: COMPLETE";
            } catch (err) {
                console.error(err);
                alert("Processing failed. Your browser might have run out of memory.");
                statusTag.innerText = "STATUS: ERROR";
            } finally {
                loading.classList.add('hidden');
                enhanceBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
