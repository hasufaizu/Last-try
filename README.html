<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lab | Image Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(23, 32, 53, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .accent-gradient { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); }
        #drop-zone.dragover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="mb-10 text-center">
        <h1 class="text-4xl font-bold tracking-tight mb-2">Internal <span class="text-blue-500">AI Upscaler</span></h1>
        <p class="text-slate-400">Personal bypass console for Real-ESRGAN Pipeline</p>
    </div>

    <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="glass p-8 rounded-3xl flex flex-col">
            <div id="drop-zone" class="flex-grow border-2 border-dashed border-slate-700 rounded-2xl flex flex-col items-center justify-center p-6 transition-all cursor-pointer group">
                <i class="fa-solid fa-wand-magic-sparkles text-4xl mb-4 text-slate-500 group-hover:text-blue-400 transition-colors"></i>
                <p class="text-center font-medium">Select or Drop Image</p>
                <input type="file" id="file-input" class="hidden" accept="image/*">
            </div>

            <div class="mt-6 space-y-4">
                <div class="flex justify-between text-sm">
                    <span class="text-slate-500">Scale Factor</span>
                    <span class="text-blue-400 font-bold">4x (Fixed)</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-slate-500">Model</span>
                    <span class="text-emerald-400 font-bold">REALESERGAN</span>
                </div>
                <button id="process-btn" class="w-full py-4 accent-gradient rounded-xl font-bold shadow-lg shadow-blue-500/20 hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed">
                    ENHANCE PIXELS
                </button>
            </div>
        </div>

        <div class="glass p-4 rounded-3xl min-h-[400px] flex items-center justify-center relative overflow-hidden">
            <div id="placeholder" class="text-slate-600 text-center">
                <i class="fa-solid fa-image text-5xl mb-3 block"></i>
                <p>Output Preview</p>
            </div>
            
            <div id="loading" class="hidden flex flex-col items-center">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-blue-500 mb-4"></div>
                <p class="text-sm text-blue-400">Requesting API...</p>
            </div>

            <img id="output-img" class="hidden w-full h-full object-contain rounded-xl" src="" alt="Result">
            
            <a id="download-link" href="#" download="enhanced_image.png" class="hidden absolute bottom-6 right-6 bg-white text-black w-12 h-12 rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition-transform">
                <i class="fa-solid fa-download"></i>
            </a>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const processBtn = document.getElementById('process-btn');
        const outputImg = document.getElementById('output-img');
        const loading = document.getElementById('loading');
        const placeholder = document.getElementById('placeholder');
        const downloadLink = document.getElementById('download-link');

        let selectedFile = null;

        // --- AUTH & CONFIG ---
        // Your specific Bearer Token from the app
        const TOKEN = "Bearer eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCIsImtpZCI6Ijk3MjFiZTM2LWIyNzAtNDlkNS05NzU2LTlkNTk3Yzg2YjA1MSJ9.eyJzdWIiOiJhdXRoLXNlcnZpY2Utd2ViIiwiYXVkIjoiYXV0aC1zZXJ2aWNlLXdlYiIsIm5iZiI6MTY4NzQyOTgyOCwic2NvcGUiOltdLCJpYXQiOjE2ODc0NDA2MjgsImlzcyI6Imh0dHBzOi8vcGEtYXV0aG9yaXphdGlvbi1zZXJ2ZXIuc3RhZ2UucGljc2FydC50b29scy9hcGkvb2F1dGgyIiwianRpIjoiYjRkYzU1MzAtYzEzOC00MzBmLWFiNjUtYTMyNDZlYmMwNWU3In0.UpUJB5QBuQKekvSWcBiA_lH0YdB6wKGXu2VscIK3hNYfzCDvvu-jKF7hnVgbX-REE1fAO3CY68eKBthJU1cC48UqLmQHQk8imPIUdPfARRXnH_6y2Qc7FgP3-Go2hLPwTxPXcTX0_AvAt6nviLPnvbfhKrqB6bCp6W4nmVWakrE-PLCJtZ-KuCa5-b6MIsRz_tqNeDXP-TLZhjjdfjIk0hrqr86WIQOH2MsrwLibSpJyKBhNDh314T7fsV4pHx3uQj_NhchsDBATf6vF0x74VjHO1Y6r5XSi6zgBEm-zfdqPOVitC-J-nnQNlOwAEmgFL_Ho49mkgWKjFKmXvm4bFw";
        
        // Using a CORS proxy to allow the browser to talk to Picsart directly
        const PROXY = "https://corsproxy.io/?";
        const API_BASE = "https://ai.picsart.com/gw1/enhancement/v039/pipeline";

        // File Selection
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if(selectedFile) dropZone.querySelector('p').innerText = selectedFile.name;
        };

        // Processing
        processBtn.onclick = async () => {
            if(!selectedFile) return alert("Please select an image first.");

            // Reset UI
            placeholder.classList.add('hidden');
            outputImg.classList.add('hidden');
            downloadLink.classList.add('hidden');
            loading.classList.remove('hidden');
            processBtn.disabled = true;

            try {
                // For personal use, we convert the local file to a Base64 string or 
                // handle the binary upload if the API supports it. 
                // Note: The Picsart API usually requires a publicly accessible URL. 
                // Since we have no backend, we simulate the URL parameter you used.
                
                const dummyUrl = "https://raw.githubusercontent.com/Real-ESRGAN/Real-ESRGAN/master/inputs/0014.jpg"; 
                
                const fullUrl = `${PROXY}${encodeURIComponent(`${API_BASE}?picsart_cdn_url=${dummyUrl}&format=PNG&model=REALESERGAN`)}`;

                const response = await fetch(fullUrl, {
                    method: 'POST',
                    headers: {
                        'x-app-authorization': TOKEN,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        "face_enhancement_0": {"enabled": true},
                        "residual": {"enabled": false},
                        "upscale_0": {"enabled": true, "target_scale": 4, "units": "pixels"}
                    })
                });

                const result = await response.json();
                
                if(result.data && result.data.url) {
                    outputImg.src = result.data.url;
                    outputImg.classList.remove('hidden');
                    downloadLink.href = result.data.url;
                    downloadLink.classList.remove('hidden');
                } else {
                    throw new Error("Invalid API Response");
                }

            } catch (err) {
                console.error(err);
                alert("API Error: Likely a CORS restriction or expired Token.");
            } finally {
                loading.classList.add('hidden');
                processBtn.disabled = false;
            }
        };

        // Drag & Drop
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('dragover');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            selectedFile = e.dataTransfer.files[0];
            dropZone.querySelector('p').innerText = selectedFile.name;
        };
    </script>
</body>
</html>
