<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision | Neural Image Enhancer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@upscalerjs/default-model@0.10.1/dist/bundle.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upscaler@0.14.1/dist/browser/umd/upscaler.min.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 850px;
            background: var(--card);
            padding: 2.5rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            text-align: center;
        }

        header h1 { font-size: 2.2rem; margin-bottom: 0.5rem; letter-spacing: -1px; }
        header h1 span { color: var(--primary); }
        header p { color: var(--text-dim); margin-bottom: 2rem; font-size: 0.95rem; }

        .upload-box {
            border: 2px dashed #475569;
            padding: 4rem 2rem;
            border-radius: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(15, 23, 42, 0.3);
        }

        .upload-box:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        /* Loading Screen */
        #loading-screen { display: none; padding: 2rem; }
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Comparison Slider */
        #result-area { display: none; }
        .slider-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 10;
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
        }

        .img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0; left: 0;
        }

        .after-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 50%;
            height: 100%;
            overflow: hidden;
            border-right: 3px solid var(--primary);
            z-index: 2;
        }

        .slider-input {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            -webkit-appearance: none;
            background: transparent;
            cursor: ew-resize;
            z-index: 10;
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            padding: 0.9rem 2rem;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #334155; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI<span>Enhance</span> Pro</h1>
        <p>Neural Pixel Reconstruction Engine</p>
    </header>

    <div id="upload-area" class="upload-box">
        <input type="file" id="file-input" accept="image/*" hidden>
        <span style="font-size: 3.5rem;">✨</span>
        <h3>Drop Image for AI Upscaling</h3>
        <p>Uses ESRGAN Neural Network</p>
    </div>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h3 id="status-text">Waking up Neural Engine...</h3>
        <p id="progress-subtext">This may take a few seconds depending on your GPU</p>
    </div>

    <div id="result-area">
        <div class="slider-container">
            <img id="img-before" class="img" src="" alt="Original">
            <div class="after-overlay" id="after-wrap">
                <img id="img-after" class="img" src="" alt="Enhanced">
            </div>
            <input type="range" min="0" max="100" value="50" class="slider-input" id="slider-range">
        </div>

        <div class="controls">
            <button class="btn btn-secondary" onclick="location.reload()">New Image</button>
            <button class="btn btn-primary" id="download-btn">Download 4K Result</button>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const uploadArea = document.getElementById('upload-area');
    const loadingScreen = document.getElementById('loading-screen');
    const resultArea = document.getElementById('result-area');
    const statusText = document.getElementById('status-text');
    const imgBefore = document.getElementById('img-before');
    const imgAfter = document.getElementById('img-after');
    const afterWrap = document.getElementById('after-wrap');
    const slider = document.getElementById('slider-range');

    // Initialize Upscaler
    const upscaler = new Upscaler();

    uploadArea.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
        if (e.target.files.length) processImage(e.target.files[0]);
    };

    async function processImage(file) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        
        reader.onload = async (e) => {
            const dataUrl = e.target.result;
            imgBefore.src = dataUrl;
            
            uploadArea.style.display = 'none';
            loadingScreen.style.display = 'block';
            statusText.innerText = "Reconstructing Pixels...";

            try {
                // REAL AI ENHANCEMENT
                // The upscale() function uses the GPU via TensorFlow.js to redraw the image
                const enhancedDataUrl = await upscaler.upscale(dataUrl, {
                    patchSize: 64, // Breaks image into chunks to prevent crashing browser
                    padding: 5
                });

                imgAfter.src = enhancedDataUrl;
                
                loadingScreen.style.display = 'none';
                resultArea.style.display = 'block';
            } catch (err) {
                console.error(err);
                alert("AI Engine Error: Try a smaller image or refresh.");
                location.reload();
            }
        };
    }

    slider.oninput = (e) => {
        afterWrap.style.width = e.target.value + "%";
    };

    document.getElementById('download-btn').onclick = () => {
        const link = document.createElement('a');
        link.download = 'ai-enhanced.png';
        link.href = imgAfter.src;
        link.click();
    };
</script>

</body>
</html>
