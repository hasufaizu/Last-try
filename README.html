<!-- Replace the .grid-panel section with this -->
<div class="grid-panel">
  <!-- LEFT: upload + settings -->
  <div class="upload-area">
    <div class="dropzone" id="dropzone">
      <div class="upload-icon">🖼️</div>
      <p style="font-weight: 600; margin-bottom: 6px;">Ready to enhance?</p>
      <p style="font-size: 0.75rem; color: #64748b;">Drag your photo here</p>
      <button type="button" class="btn-select" id="selectFileBtn">Browse Files</button>
      <input type="file" id="fileInput" accept="image/*" class="file-input">
    </div>

    <div class="settings-card">
      <div class="settings-title"><span>⚙️ Configuration</span></div>
      <div class="radio-group">
        <label><input type="radio" name="upscale" value="2" checked> 2x Sharp</label>
        <label><input type="radio" name="upscale" value="4"> 4x Ultra</label>
      </div>
      <div class="format-group">
        <span>Format:</span>
        <select id="formatSelect" class="format-select">
          <option value="JPG">JPEG</option>
          <option value="PNG">PNG</option>
        </select>
      </div>
      <button id="enhanceBtn" class="enhance-btn">
        <span>⚡ Start AI Processing</span>
      </button>
      <div id="apiMessage" style="margin-top: 12px;"></div>
    </div>
  </div>

  <!-- RIGHT: Interactive Comparison Slider -->
  <div class="preview-area">
    <div class="comparison-container" id="comparisonContainer" style="display: none;">
      <!-- Original (Bottom Layer) -->
      <img id="originalImg" src="" alt="Original">
      
      <!-- Enhanced (Top Layer) -->
      <div class="enhanced-wrapper" id="enhancedWrapper">
        <img id="enhancedImg" src="" alt="Enhanced">
      </div>

      <!-- The Slider Control -->
      <input type="range" min="0" max="100" value="50" class="slider" id="comparisonSlider">
      
      <div class="label label-before">Original</div>
      <div class="label label-after">AI Enhanced</div>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="placeholder-card">
      <div class="shimmer-icon">✨</div>
      <p>Upload a photo to see the AI magic</p>
    </div>

    <button id="downloadBtn" class="download-btn" style="display: none; width: 100%; justify-content: center; margin-top: 1.5rem; background: #0f172a; color: white;">
      ⬇️ Download Enhanced Photo
    </button>
  </div>
</div>

<style>
  /* --- NEW CSS FOR SLIDER & ANIMATIONS --- */
  
  .preview-area { position: relative; }

  .comparison-container {
    position: relative;
    width: 100%;
    height: 450px;
    border-radius: 1.5rem;
    overflow: hidden;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
    background: #e2e8f0;
  }

  .comparison-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    position: absolute;
    top: 0;
    left: 0;
  }

  .enhanced-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 50%;
    height: 100%;
    overflow: hidden;
    border-right: 2px solid white;
    z-index: 2;
  }

  .enhanced-wrapper img {
    width: 100%; /* Important: must match parent container width for alignment */
    height: 100%;
    object-fit: contain;
    /* This ensures the image doesn't shrink when the wrapper does */
    max-width: none; 
  }

  .slider {
    position: absolute;
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 100%;
    background: transparent;
    outline: none;
    margin: 0;
    transition: all 0.2s;
    z-index: 10;
    cursor: ew-resize;
  }

  /* Labels */
  .label {
    position: absolute;
    bottom: 20px;
    padding: 4px 12px;
    background: rgba(0,0,0,0.6);
    color: white;
    border-radius: 4px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    pointer-events: none;
    z-index: 11;
  }
  .label-before { right: 20px; }
  .label-after { left: 20px; }

  /* Shimmer Animation for Loading */
  @keyframes shimmer {
    0% { background-position: -468px 0; }
    100% { background-position: 468px 0; }
  }

  .loading-shimmer {
    background: linear-gradient(to right, #f6f7f8 8%, #edeef1 18%, #f6f7f8 33%);
    background-size: 800px 104px;
    animation: shimmer 1.25s infinite linear;
  }

  .placeholder-card {
    height: 450px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 2px dashed #cbd5e1;
    border-radius: 1.5rem;
    color: #94a3b8;
  }

  .shimmer-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
</style>

<script>
  // Updated Slider Logic
  const slider = document.getElementById('comparisonSlider');
  const enhancedWrapper = document.getElementById('enhancedWrapper');
  const comparisonContainer = document.getElementById('comparisonContainer');
  const emptyState = document.getElementById('emptyState');
  const originalImg = document.getElementById('originalImg');
  const enhancedImg = document.getElementById('enhancedImg');

  // Handle Slider Movement
  slider.addEventListener('input', (e) => {
    const sliderPos = e.target.value;
    enhancedWrapper.style.width = `${sliderPos}%`;
  });

  // Function to Sync Image Widths
  // Since the 'enhanced-wrapper' changes width, we need to ensure the 
  // image inside it stays the same size as the container to prevent "stretching"
  function syncImageWidths() {
    const containerWidth = comparisonContainer.offsetWidth;
    enhancedImg.style.width = containerWidth + 'px';
  }

  window.addEventListener('resize', syncImageWidths);

  // Integrate with your existing fetch logic
  // Update your handleFile or enhanceImage function to toggle these:
  
  /* 
    Inside your enhanceImage() 'try' block, after you get the blobUrl:
    
    emptyState.style.display = 'none';
    comparisonContainer.style.display = 'block';
    originalImg.src = currentOriginalUrl;
    enhancedImg.src = blobUrl;
    syncImageWidths(); 
  */
</script>
