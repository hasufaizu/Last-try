<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision | Image Enhancer Pro</title>
    <style>
        /* CSS STYLES */
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        header h1 span { color: var(--primary); }
        header p { color: var(--text-dim); margin-bottom: 2rem; }

        /* Upload Box */
        .upload-box {
            border: 2px dashed #475569;
            padding: 4rem 2rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .upload-box:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-box .icon { font-size: 3rem; margin-bottom: 1rem; display: block; }

        /* Comparison Slider */
        .comparison-slider {
            position: relative;
            width: 100%;
            height: 500px;
            overflow: hidden;
            border-radius: 1rem;
            background: #000;
            display: none;
        }

        .comparison-slider img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
        }

        #img-after {
            filter: contrast(1.15) brightness(1.05) saturate(1.1) sharpen(1px);
            /* This mimics the "AI" look by boosting details */
        }

        .after-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            overflow: hidden;
            border-right: 3px solid var(--primary);
            z-index: 2;
        }

        .slider-input {
            position: absolute;
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 100%;
            background: transparent;
            outline: none;
            top: 0;
            left: 0;
            cursor: ew-resize;
            z-index: 10;
        }

        /* Loading Animation */
        #loading-screen { display: none; padding: 3rem; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Buttons */
        .controls { margin-top: 2rem; display: none; gap: 1rem; justify-content: center; }
        .btn {
            padding: 0.8rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: #475569; color: white; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI<span>Enhance</span></h1>
        <p>Professional Grade Image Upscaling & Clarity</p>
    </header>

    <div id="upload-area" class="upload-box" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept="image/*" hidden>
        <span class="icon">🖼️</span>
        <h3>Drop your image here</h3>
        <p>Supports JPG, PNG (Max 10MB)</p>
    </div>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h3>AI Neural Engine Processing...</h3>
        <p>Reconstructing pixels and reducing noise</p>
    </div>

    <div id="result-area" class="hidden">
        <div class="comparison-slider">
            <img id="img-before" src="" alt="Before">
            <div class="after-container" id="after-wrap">
                <img id="img-after" src="" alt="After">
            </div>
            <input type="range" min="0" max="100" value="50" class="slider-input" id="slider-handle">
        </div>

        <div class="controls" id="control-bar" style="display: flex;">
            <button class="btn btn-secondary" onclick="window.location.reload()">Reset</button>
            <button class="btn btn-primary" id="download-btn">Download Enhanced</button>
        </div>
    </div>
</div>

<script>
    // JAVASCRIPT LOGIC
    const fileInput = document.getElementById('file-input');
    const uploadArea = document.getElementById('upload-area');
    const loadingScreen = document.getElementById('loading-screen');
    const resultArea = document.getElementById('result-area');
    const slider = document.getElementById('slider-handle');
    const afterWrap = document.getElementById('after-wrap');
    
    const imgBefore = document.getElementById('img-before');
    const imgAfter = document.getElementById('img-after');

    // Handle File Selection
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const imgData = event.target.result;
                imgBefore.src = imgData;
                imgAfter.src = imgData;
                processImage();
            };
            reader.readAsDataURL(file);
        }
    };

    function processImage() {
        uploadArea.style.display = 'none';
        loadingScreen.style.display = 'block';

        // Simulate AI computation time
        setTimeout(() => {
            loadingScreen.style.display = 'none';
            resultArea.classList.remove('hidden');
            document.querySelector('.comparison-slider').style.display = 'block';
        }, 2000);
    }

    // Comparison Slider Interaction
    slider.oninput = (e) => {
        const value = e.target.value;
        afterWrap.style.width = value + "%";
    };

    // Export / Download Functional Logic
    document.getElementById('download-btn').onclick = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        // Match canvas to real image size
        canvas.width = imgAfter.naturalWidth;
        canvas.height = imgAfter.naturalHeight;

        // Apply "AI" filters to the export
        ctx.filter = "contrast(1.15) brightness(1.05) saturate(1.1)";
        ctx.drawImage(imgAfter, 0, 0);

        const link = document.createElement('a');
        link.download = 'ai-enhanced-image.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    };

    // Drag and Drop support
    uploadArea.ondragover = (e) => { e.preventDefault(); uploadArea.style.borderColor = "#6366f1"; };
    uploadArea.ondragleave = () => { uploadArea.style.borderColor = "#475569"; };
    uploadArea.ondrop = (e) => {
        e.preventDefault();
        fileInput.files = e.dataTransfer.files;
        fileInput.dispatchEvent(new Event('change'));
    };
</script>

</body>
</html>
