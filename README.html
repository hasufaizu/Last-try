<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini 4K | 2026 Pro Enhancer</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: system-ui; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 800px; background: var(--card); padding: 2rem; border-radius: 20px; text-align: center; }
        .upload-box { border: 2px dashed #475569; padding: 3rem; border-radius: 15px; cursor: pointer; }
        #loading { display: none; margin: 20px; }
        .slider-container { position: relative; width: 100%; display: none; border-radius: 10px; overflow: hidden; }
        .img { width: 100%; display: block; }
        #after-wrap { position: absolute; top: 0; left: 0; width: 50%; height: 100%; overflow: hidden; border-right: 3px solid var(--primary); z-index: 2; }
        .slider-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; -webkit-appearance: none; background: transparent; cursor: ew-resize; z-index: 10; }
        .btn { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Gemini<span>4K</span> Nano</h1>
    <div id="upload-area" class="upload-box" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" hidden accept="image/*">
        <p>Drop image to upscale using Nano Banana 2</p>
    </div>

    <div id="loading">
        <p>🔄 Gemini is rebuilding the pixels...</p>
    </div>

    <div id="result-area" class="slider-container">
        <img id="img-before" class="img">
        <div id="after-wrap"><img id="img-after" class="img"></div>
        <input type="range" min="0" max="100" value="50" class="slider-input" oninput="document.getElementById('after-wrap').style.width = this.value + '%'">
        <button class="btn" onclick="location.reload()">Start New</button>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // 1. YOUR API KEY HERE
    const API_KEY = "AIzaSyC4vK5cdkvqbbXbS6h0kZqD1CN2iM-tla8";
    const genAI = new GoogleGenerativeAI(API_KEY);

    const fileInput = document.getElementById('file-input');

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.readAsDataURL(file);
        
        reader.onload = async () => {
            document.getElementById('upload-area').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('img-before').src = reader.result;

            try {
                // 2. Use the correct Image Generation model
                const model = genAI.getGenerativeModel({ model: "gemini-3.1-flash-image-preview" });

                const base64Data = reader.result.split(',')[1];
                const prompt = "Upscale this image to 4K. Remove all noise, artifacts, and blur. Generate a high-fidelity, photorealistic version that is identical to the original but sharper.";

                // 3. Generate content with both prompt and image data
                const result = await model.generateContent([
                    prompt,
                    { inlineData: { data: base64Data, mimeType: file.type } }
                ]);

                const response = await result.response;
                
                // 4. Access the inline image data from the parts array
                const parts = response.candidates[0].content.parts;
                const imagePart = parts.find(p => p.inlineData);

                if (imagePart) {
                    document.getElementById('img-after').src = `data:image/png;base64,${imagePart.inlineData.data}`;
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('result-area').style.display = 'block';
                } else {
                    alert("Gemini analyzed the image but didn't generate a new one. Try a shorter prompt like 'Sharpen this image'.");
                    location.reload();
                }

            } catch (err) {
                console.error(err);
                alert("API Error. Make sure your API key is valid and you have remaining quota.");
                location.reload();
            }
        };
    };
</script>
</body>
</html>
