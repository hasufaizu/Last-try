<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini 4K | 2026 Pro Enhancer</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: system-ui; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 800px; background: var(--card); padding: 2rem; border-radius: 20px; text-align: center; }
        .upload-box { border: 2px dashed #475569; padding: 3rem; border-radius: 15px; cursor: pointer; }
        #loading { display: none; margin: 20px; }
        .slider-container { position: relative; width: 100%; display: none; border-radius: 10px; overflow: hidden; }
        .img { width: 100%; display: block; }
        #after-wrap { position: absolute; top: 0; left: 0; width: 50%; height: 100%; overflow: hidden; border-right: 3px solid var(--primary); z-index: 2; }
        .slider-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; -webkit-appearance: none; background: transparent; cursor: ew-resize; z-index: 10; }
        .btn { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Gemini<span>4K</span> Nano</h1>
    <div id="upload-area" class="upload-box" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" hidden accept="image/*">
        <p>Drop image to upscale using Nano Banana 2</p>
    </div>

    <div id="loading">
        <p>🔄 Gemini is rebuilding the pixels...</p>
    </div>

    <div id="result-area" class="slider-container">
        <img id="img-before" class="img">
        <div id="after-wrap"><img id="img-after" class="img"></div>
        <input type="range" min="0" max="100" value="50" class="slider-input" oninput="document.getElementById('after-wrap').style.width = this.value + '%'">
        <button class="btn" onclick="location.reload()">Start New</button>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // 1. PLACE YOUR KEY HERE
    const API_KEY = "AIzaSyC4vK5cdkvqbbXbS6h0kZqD1CN2iM-tla8"; 
    const genAI = new GoogleGenerativeAI(API_KEY);

    const fileInput = document.getElementById('file-input');
    const loading = document.getElementById('loading');
    const resultArea = document.getElementById('result-area');
    const imgBefore = document.getElementById('img-before');
    const imgAfter = document.getElementById('img-after');

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            document.getElementById('upload-area').style.display = 'none';
            loading.style.display = 'block';
            imgBefore.src = reader.result;

            try {
                // 2. Use the exact 2026 Model ID
                const model = genAI.getGenerativeModel({ 
                    model: "gemini-3.1-flash-image-preview" 
                });
                
                const base64Data = reader.result.split(',')[1];
                
                // 3. Request both Text and Image modalities
                const result = await model.generateContent({
                    contents: [{
                        parts: [
                            { text: "Enhance this image to 4K resolution. Remove noise and sharpen details while keeping the subject identical." },
                            { inlineData: { data: base64Data, mimeType: file.type } }
                        ]
                    }],
                    generationConfig: {
                        // Crucial: Tells Gemini to return an image, not just a description
                        response_modalities: ["IMAGE"] 
                    }
                });

                const response = await result.response;
                
                // 4. Extract the generated image from the response parts
                const imagePart = response.candidates[0].content.parts.find(part => part.inlineData);

                if (imagePart) {
                    imgAfter.src = `data:${imagePart.inlineData.mimeType};base64,${imagePart.inlineData.data}`;
                    loading.style.display = 'none';
                    resultArea.style.display = 'block';
                } else {
                    throw new Error("Gemini analyzed the photo but didn't generate an image part.");
                }

            } catch (err) {
                console.error("Gemini Error:", err);
                alert("Failed to enhance: " + err.message);
                location.reload();
            }
        };
    };

    // Slider Logic
    document.getElementById('slider').oninput = (e) => {
        document.getElementById('after-wrap').style.width = e.target.value + "%";
    };

    document.getElementById('download-btn').onclick = () => {
        const a = document.createElement("a");
        a.href = imgAfter.src;
        a.download = "gemini-enhanced.png";
        a.click();
    };
</script>
</body>
</html>
