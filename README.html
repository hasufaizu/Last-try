<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VisionAI | Personal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/upscaler@latest/dist/browser/umd/upscaler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@upscalerjs/esrgan-slim@latest/dist/browser/umd/2x.min.js"></script>

    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.1); }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        #drop-zone.dragover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="glass w-full max-w-4xl rounded-[2.5rem] p-10">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-black tracking-tighter">VISION<span class="text-blue-500">AI</span></h1>
            <div id="status-tag" class="text-[10px] text-orange-500 font-mono bg-slate-900 px-3 py-1 rounded-full border border-slate-800">
                STATUS: INITIALIZING ENGINE...
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div id="drop-zone" class="h-64 border-2 border-dashed border-slate-800 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:border-blue-500/50 transition-all group">
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                    <i class="fa-solid fa-cloud-arrow-up text-4xl text-slate-700 mb-2 group-hover:text-blue-500"></i>
                    <p id="file-name" class="text-slate-500 text-sm font-medium">Click or Drag Image Here</p>
                </div>

                <button id="enhance-btn" disabled class="w-full py-5 bg-blue-600 rounded-2xl font-bold tracking-widest btn-glow transition-all active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed">
                    ENHANCE IMAGE
                </button>
            </div>

            <div class="bg-black/60 rounded-3xl border border-slate-800 flex items-center justify-center relative min-h-[350px] overflow-hidden">
                <div id="preview-idle" class="text-slate-800 text-center">
                    <i class="fa-solid fa-image text-6xl mb-2"></i>
                    <p class="text-xs font-bold uppercase">No Output</p>
                </div>

                <div id="preview-loading" class="hidden text-center z-10">
                    <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                    <p class="text-blue-500 text-[10px] font-bold">PROCESSING ON GPU...</p>
                </div>

                <img id="preview-img" src="" class="hidden w-full h-full object-contain">
                <a id="dl-link" href="#" download="enhanced.png" class="hidden absolute bottom-4 right-4 bg-white text-black p-3 rounded-full shadow-xl"><i class="fa-solid fa-download"></i></a>
            </div>
        </div>
    </div>

    <script>
        // Ensure scripts are loaded before allowing interaction
        let upscaler;
        const statusTag = document.getElementById('status-tag');
        const enhanceBtn = document.getElementById('enhance-btn');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const previewImg = document.getElementById('preview-img');
        const idle = document.getElementById('preview-idle');
        const loading = document.getElementById('preview-loading');
        const dlLink = document.getElementById('dl-link');

        window.onload = () => {
            try {
                upscaler = new Upscaler({ model: window['esrgan-slim']['2x'] });
                statusTag.innerText = "STATUS: READY";
                statusTag.classList.replace('text-orange-500', 'text-green-500');
                enhanceBtn.disabled = false;
            } catch (e) {
                statusTag.innerText = "STATUS: ENGINE ERROR";
                console.error("AI Load Error:", e);
            }
        };

        // FIXED: Explicit Click Trigger
        dropZone.addEventListener('click', (e) => {
            e.preventDefault();
            fileInput.click();
        });

        // FIXED: Handle File Selection
        fileInput.addEventListener('change', function(e) {
            const file = this.files[0];
            if (file) handleFile(file);
        });

        function handleFile(file) {
            document.getElementById('file-name').innerText = file.name;
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                previewImg.classList.remove('hidden');
                idle.classList.add('hidden');
                dlLink.classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        enhanceBtn.onclick = async () => {
            if (!previewImg.src || previewImg.classList.contains('hidden')) return alert("Select an image!");
            
            loading.classList.remove('hidden');
            previewImg.classList.add('opacity-30');
            enhanceBtn.disabled = true;

            try {
                const result = await upscaler.upscale(previewImg.src);
                previewImg.src = result;
                dlLink.href = result;
                dlLink.classList.remove('hidden');
                previewImg.classList.remove('opacity-30');
            } catch (err) {
                alert("Processing failed. Image may be too large.");
                console.error(err);
            } finally {
                loading.classList.add('hidden');
                enhanceBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
