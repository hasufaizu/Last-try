<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Image Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
            color: white;
        }

        .stats {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 0.5rem;
            flex: 1;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .image-card {
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .image-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .image-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            cursor: pointer;
        }

        .image-info {
            padding: 1rem;
            background: white;
        }

        .image-info p {
            font-size: 0.8rem;
            color: #475569;
            margin: 0.25rem 0;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.7rem;
            font-weight: 600;
            margin-right: 0.5rem;
        }

        .badge-original {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-enhanced {
            background: #dcfce7;
            color: #166534;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            margin-top: 0.5rem;
            width: 100%;
            font-weight: 600;
            transition: background 0.2s;
        }

        .delete-btn:hover {
            background: #dc2626;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: white;
            font-size: 1.2rem;
        }

        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            margin-left: 1rem;
        }

        .auth-error {
            background: #ef4444;
            color: white;
            padding: 1rem;
            border-radius: 0.5rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Private Admin Gallery</h1>
            <p>All uploaded and enhanced images - accessible only with correct password</p>
            <div class="stats">
                <div class="stat-card">
                    <div>📸 Total Images</div>
                    <div id="totalCount" style="font-size: 2rem; font-weight: bold;">0</div>
                </div>
                <div class="stat-card">
                    <div>✨ Enhanced Images</div>
                    <div id="enhancedCount" style="font-size: 2rem; font-weight: bold;">0</div>
                </div>
                <div class="stat-card">
                    <div>💾 Storage Used</div>
                    <div id="storageUsed" style="font-size: 2rem; font-weight: bold;">0 MB</div>
                </div>
            </div>
            <button class="refresh-btn" onclick="loadImages()">🔄 Refresh Gallery</button>
        </div>

        <div id="gallery" class="gallery"></div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <img id="modalImage">
    </div>

    <script>
        // CONFIGURATION - Change these!
        const ADMIN_PASSWORD = "unth"; // Change this to your password
        const JSONBIN_BIN_ID = "6a01b6c0250b1311c3334aed"; // Same as index.html
        const JSONBIN_API_KEY = "$2a$10$6GTFn.ZLxsDXMvnVcKvqB.Wb3735l20g52AebtN4HPQV0S8cu7IXq"; // Same as index.html

        let imagesData = [];

        // Authentication check
        function checkAuth() {
            let isAuthenticated = sessionStorage.getItem('adminAuth');
            if (!isAuthenticated) {
                const password = prompt("🔐 Admin Access Required\nEnter password to view gallery:");
                if (password === ADMIN_PASSWORD) {
                    sessionStorage.setItem('adminAuth', 'true');
                    return true;
                } else {
                    document.body.innerHTML = '<div class="container"><div class="auth-error">❌ Access Denied! Incorrect password.</div></div>';
                    return false;
                }
            }
            return true;
        }

        // Load images from JSONBin
        async function loadImages() {
            if (!checkAuth()) return;

            const galleryDiv = document.getElementById('gallery');
            galleryDiv.innerHTML = '<div class="loading">📥 Loading images from cloud...</div>';

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });

                if (!response.ok) throw new Error('Failed to fetch data');

                const data = await response.json();
                imagesData = data.record?.images || [];

                // Update stats
                const total = imagesData.length;
                const enhanced = imagesData.filter(img => img.enhanced).length;
                const totalSize = imagesData.reduce((acc, img) => acc + (img.base64?.length || 0), 0);
                const sizeMB = (totalSize * 0.75 / (1024 * 1024)).toFixed(1);

                document.getElementById('totalCount').textContent = total;
                document.getElementById('enhancedCount').textContent = enhanced;
                document.getElementById('storageUsed').textContent = sizeMB;

                // Render gallery
                if (total === 0) {
                    galleryDiv.innerHTML = '<div class="loading">📭 No images yet. Upload some images from the main page!</div>';
                    return;
                }

                galleryDiv.innerHTML = '';
                imagesData.forEach((image, index) => {
                    const card = document.createElement('div');
                    card.className = 'image-card';
                    
                    const date = new Date(image.timestamp).toLocaleString();
                    const isEnhanced = image.enhanced;
                    
                    card.innerHTML = `
                        <img src="${image.base64}" alt="Image ${index}" onclick="openModal(this.src)">
                        <div class="image-info">
                            <span class="badge ${isEnhanced ? 'badge-enhanced' : 'badge-original'}">
                                ${isEnhanced ? '✨ Enhanced' : '📷 Original'}
                            </span>
                            <p>📅 ${date}</p>
                            <p>📁 ${image.filename || (isEnhanced ? 'Enhanced image' : 'Original upload')}</p>
                            ${image.upscaleFactor ? `<p>📊 ${image.upscaleFactor}x Upscale</p>` : ''}
                            <button class="delete-btn" onclick="deleteImage(${image.id})">🗑️ Delete</button>
                        </div>
                    `;
                    galleryDiv.appendChild(card);
                });

            } catch (error) {
                console.error('Load error:', error);
                galleryDiv.innerHTML = '<div class="loading">❌ Error loading images. Make sure JSONBin is configured correctly.</div>';
            }
        }

        // Delete image
        async function deleteImage(imageId) {
            if (!confirm('Are you sure you want to delete this image permanently?')) return;

            try {
                // Remove from local array
                imagesData = imagesData.filter(img => img.id !== imageId);
                
                // Update JSONBin
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify({ images: imagesData })
                });

                if (response.ok) {
                    alert('✓ Image deleted successfully!');
                    loadImages(); // Refresh gallery
                } else {
                    alert('❌ Failed to delete');
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('Error deleting image');
            }
        }

        function openModal(src) {
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modalImage');
            modal.style.display = 'flex';
            modalImg.src = src;
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Initial load
        loadImages();
    </script>
</body>
</html>
